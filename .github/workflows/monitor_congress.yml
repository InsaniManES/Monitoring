# Feliz congress registration: alert when page is open (no password) or closed (password-protected).
name: Monitor Feliz Congress

on:
  schedule:
    - cron: "*/5 * * * *"  # every 5 minutes
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Restore previous state
        uses: actions/cache/restore@v4
        with:
          key: feliz-monitor-state
          path: .feliz-state

      - name: Check registration and notify
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python3 << 'PY'
          import os
          import requests
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo

          ISRAEL_TZ = ZoneInfo("Asia/Jerusalem")
          BLOCK_TEXT = "This content is password-protected. To view it, please enter the password below"
          year = datetime.now(ISRAEL_TZ).year
          url = f"https://www.feliz.co.il/event/congress-{year}/"

          def date_str(dt):
              return f"{dt.day}.{dt.month}.{dt.year}"
          def time_str(dt):
              return f"{dt.hour:02d}:{dt.minute:02d}"

          r = requests.get(url, headers={"User-Agent": "FelizWatcher/1.0"}, timeout=15)
          r.raise_for_status()
          html = r.text
          still_blocked = BLOCK_TEXT in html
          now_dt = datetime.now(ISRAEL_TZ)

          state_dir = Path(".feliz-state")
          state_dir.mkdir(exist_ok=True)
          state_file = state_dir / "was_blocked.txt"

          was_blocked = None
          if state_file.exists():
              was_blocked = state_file.read_text().strip() == "true"

          send = False
          if still_blocked:
              if was_blocked is None or was_blocked is False:
                  send = True
                  msg = f"🔒 ההרשמה לקונגרס נסגרה\n{url}\n📅 {date_str(now_dt)}\n🕐 {time_str(now_dt)}"
          else:
              if was_blocked is None or was_blocked:
                  send = True
                  msg = f"🔓 ההרשמה לקונגרס נפתחה\n{url}\n📅 {date_str(now_dt)}\n🕐 {time_str(now_dt)}"

          if send:
              token = os.environ.get("BOT_TOKEN")
              chat_id = os.environ.get("CHAT_ID")
              if token and chat_id:
                  requests.post(
                      f"https://api.telegram.org/bot{token}/sendMessage",
                      json={"chat_id": chat_id, "text": msg},
                      timeout=10,
                  )

          state_file.write_text("true" if still_blocked else "false")
          PY

      - name: Save state for next run
        uses: actions/cache/save@v4
        with:
          key: feliz-monitor-state
          path: .feliz-state
